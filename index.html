<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOGUERÓN - El Juego</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
  }
  .game-wrapper {
    position: relative;
    border: 6px solid #ffd700;
    box-shadow: 0 0 0 3px #8b6914, 0 0 50px #ffd70055;
  }
  canvas#bg { position: absolute; top: 0; left: 0; image-rendering: pixelated; }
  canvas#game { position: relative; z-index: 2; image-rendering: pixelated; display: block; }
  .scanlines {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px);
    pointer-events: none; z-index: 10;
  }
  .hud-bar {
    background: linear-gradient(90deg, #1a0a2e, #2d1b5e, #1a0a2e);
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 60px 8px 60px; border-bottom: 3px solid #ffd700;
    width: 100%;
  }
  .hud-bar span { color: #ffd700; font-size: 7px; text-shadow: 1px 1px #8b6914; }
  .hud-bar .lives { color: #ff5555; }
  .hud-bar .score { color: #00ff88; }
  .bottom-bar {
    background: linear-gradient(90deg, #1a0a2e, #2d1b5e, #1a0a2e);
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 44px; border-top: 3px solid #ffd700;
    width: 100%;
  }
  .bottom-bar span { color: #88aaff; font-size: 6px; }
  .bottom-bar .basket-info { color: #ffd700; }
  #muteBtn {
    background: #1a0a2e; border: 2px solid #ffd700; color: #ffd700;
    font-family: 'Press Start 2P', monospace; font-size: 6px;
    padding: 3px 7px; cursor: pointer; image-rendering: pixelated;
    text-shadow: 1px 1px #8b6914;
    transition: background 0.1s;
  }
  #muteBtn:hover { background: #2d1b5e; }
  #muteBtn.muted { color: #ff5555; border-color: #ff5555; }
</style>
</head>
<body>

<!-- INPUT OCULTO PARA TECLADO MÓVIL - INICIALES -->
<input id="mobileInput"
  type="text"
  inputmode="text"
  autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false"
  maxlength="3"
  style="position:fixed;opacity:0;pointer-events:none;width:1px;height:1px;top:0;left:0;border:none;outline:none;background:transparent;color:transparent;font-size:16px;"
/>

<div class="game-wrapper">
  <div class="hud-bar">
    <span class="lives" id="livesDisp">♥ ♥ ♥</span>
    <span id="levelDisp">NIVEL: 1</span>
    <span class="score" id="scoreDisp">SCORE: 0</span>
  </div>
  <div style="position:relative; width:512px; height:384px;">
    <canvas id="bg" width="512" height="384"></canvas>
    <canvas id="game" width="512" height="384"></canvas>
    <div class="scanlines"></div>
    <canvas id="introCanvas" width="512" height="384" style="position:absolute;top:0;left:0;z-index:50;display:none;"></canvas>
  </div>
  <div class="bottom-bar">
    <span class="basket-info" id="basketDisp">CESTA: 0/5 🌰</span>
    <span id="storedDisp">ALMACÉN: 0</span>
    <span id="controlsDisp">← → MOVER</span>
    <button id="muteBtn" onclick="toggleMute()">♪ MÚSICA</button>
  </div>
</div>

// ─── AUDIO ENGINE (Web Audio API - 16-bit style) ──────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
let musicNodes = [];
let musicPlaying = false;

function initAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, type, duration, volume=0.3, startTime=null) {
  if (!audioCtx) return;
  const t = startTime !== null ? startTime : audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t);
  gain.gain.setValueAtTime(volume, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
  osc.start(t); osc.stop(t + duration + 0.01);
}

// SFX
function sfxPickup()  { initAudio(); playTone(880,'square',0.08,0.2); playTone(1200,'square',0.08,0.15,audioCtx.currentTime+0.05); }
function sfxDeposit() { initAudio(); [523,659,784,1047].forEach((f,i)=>playTone(f,'square',0.1,0.25,audioCtx.currentTime+i*0.07)); }
function sfxLoseLife(){ initAudio(); [400,300,200,150].forEach((f,i)=>playTone(f,'sawtooth',0.12,0.3,audioCtx.currentTime+i*0.08)); }
function sfxJump()    { initAudio(); const t=audioCtx.currentTime; const o=audioCtx.createOscillator(); const g=audioCtx.createGain(); o.connect(g);g.connect(audioCtx.destination); o.type='square'; o.frequency.setValueAtTime(300,t); o.frequency.linearRampToValueAtTime(600,t+0.12); g.gain.setValueAtTime(0.2,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.15); o.start(t);o.stop(t+0.16); }
function sfxBikeHit() { initAudio(); [200,150,100].forEach((f,i)=>playTone(f,'sawtooth',0.18,0.4,audioCtx.currentTime+i*0.1)); playTone(80,'square',0.4,0.35,audioCtx.currentTime+0.05); }
function sfxLevelUp() { initAudio(); [523,659,784,880,1047,1319].forEach((f,i)=>playTone(f,'square',0.15,0.3,audioCtx.currentTime+i*0.08)); }

// ── 16-bit chiptune music ──────────────────────────────────────────────────────
// Melodía principal: escala de La menor, estilo arcade español festivo
const MELODY = [
  // compás 1
  [440,0.18],[494,0.18],[523,0.18],[587,0.18],[659,0.18],[587,0.18],[523,0.18],[494,0.18],
  // compás 2
  [440,0.18],[392,0.18],[440,0.18],[494,0.18],[523,0.36],[523,0.18],[494,0.18],
  // compás 3
  [659,0.18],[698,0.18],[784,0.18],[698,0.18],[659,0.36],[587,0.18],[523,0.18],
  // compás 4
  [494,0.18],[523,0.18],[587,0.18],[523,0.18],[494,0.36],[440,0.36],
];
const BASS = [
  [110,0.36],[147,0.36],[131,0.36],[110,0.36],
  [98,0.36],[110,0.36],[131,0.36],[147,0.36],
];

let musicTimeout = null;

function playMusicLoop() {
  if (!audioCtx || !musicPlaying) return;
  const now = audioCtx.currentTime;
  let t = now;
  // Melody (square wave)
  MELODY.forEach(([f, dur]) => {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'square';
    o.frequency.setValueAtTime(f, t);
    g.gain.setValueAtTime(0.12, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur * 0.85);
    o.start(t); o.stop(t + dur);
    musicNodes.push(o);
    t += dur;
  });
  // Bass (triangle wave)
  let bt = now;
  for(let rep=0; rep<3; rep++){
    BASS.forEach(([f,dur]) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.type = 'triangle';
      o.frequency.setValueAtTime(f, bt);
      g.gain.setValueAtTime(0.08, bt);
      g.gain.exponentialRampToValueAtTime(0.001, bt + dur * 0.9);
      o.start(bt); o.stop(bt + dur);
      musicNodes.push(o);
      bt += dur;
    });
  }
  // Loop: schedule next iteration
  const totalDur = MELODY.reduce((s,[,d])=>s+d,0);
  musicTimeout = setTimeout(playMusicLoop, totalDur * 1000 - 50);
}

function startMusic() {
  if (musicPlaying || muted) return;
  initAudio();
  musicPlaying = true;
  playMusicLoop();
}

function stopMusic() {
  musicPlaying = false;
  if (musicTimeout) clearTimeout(musicTimeout);
  musicNodes.forEach(n => { try { n.stop(); } catch(e){} });
  musicNodes = [];
}

let muted = false;
function toggleMute() {
  muted = !muted;
  const btn = document.getElementById('muteBtn');
  if (muted) {
    stopMusic();
    btn.textContent = '♪ SILENCIO';
    btn.classList.add('muted');
  } else {
    btn.textContent = '♪ MÚSICA';
    btn.classList.remove('muted');
    if (state === 'playing' || state === 'beer') startMusic();
  }
}

// ─── RANKING SYSTEM ──────────────────────────────────────────────────────────
let ranking = [];
let nameEntry = { active: false, initials: '', cursor: 0 };

function loadRanking() {
  try {
    const saved = localStorage.getItem('nogueron_ranking');
    ranking = saved ? JSON.parse(saved) : [];
  } catch(e) { ranking = []; }
}

function saveRanking() {
  try { localStorage.setItem('nogueron_ranking', JSON.stringify(ranking)); } catch(e) {}
}

function addToRanking(initials, pts) {
  ranking.push({ initials: initials.toUpperCase(), score: pts });
  ranking.sort((a,b) => b.score - a.score);
  if (ranking.length > 8) ranking = ranking.slice(0, 8);
  saveRanking();
}

function getRankPosition(pts) {
  let pos = 1;
  for (const r of ranking) { if (r.score > pts) pos++; }
  return pos;
}

loadRanking();

const mobileInput = document.getElementById('mobileInput');

function focusMobileInput() {
  mobileInput.value = '';
  mobileInput.removeAttribute('readonly');
  mobileInput.focus();
  // Truco para forzar el teclado en iOS/Android
  setTimeout(() => { mobileInput.focus(); mobileInput.click(); }, 80);
}

function blurMobileInput() {
  mobileInput.blur();
}

mobileInput.addEventListener('input', function() {
  if (state !== 'gameover' || !nameEntry.active) return;
  // Filtrar solo letras
  const raw = this.value.replace(/[^a-zA-Z]/g, '').toUpperCase();
  // Tomar solo hasta 3 caracteres
  const letras = raw.slice(0, 3);
  nameEntry.initials = letras;
  nameEntry.cursor = Math.min(letras.length, 2);
  this.value = letras;
  // Si ya hay 3, guardar automáticamente al pulsar siguiente tecla o enter
});

mobileInput.addEventListener('keydown', function(e) {
  if (state !== 'gameover' || !nameEntry.active) return;
  if (e.key === 'Backspace') {
    if (nameEntry.initials.length > 0) {
      nameEntry.initials = nameEntry.initials.slice(0, -1);
      nameEntry.cursor = nameEntry.initials.length;
      this.value = nameEntry.initials;
    }
    e.preventDefault();
    return;
  }
  if (e.key === 'Enter' && nameEntry.initials.length === 3) {
    nameEntry.savedInitials = nameEntry.initials;
    addToRanking(nameEntry.initials, score);
    nameEntry.active = false;
    blurMobileInput();
    e.preventDefault();
    return;
  }
});

function updateBeer() {
  const ev=beerEvent; ev.timer++;
  if(ev.phase===0){ ev.doorOpen=Math.min(20,ev.timer*0.5); if(ev.timer>40){ev.phase=1;ev.timer=0;} }
  else if(ev.phase===1){
    ev.doorOpen=20;
    const target=player.x-26;
    if(ev.waiterX<target) ev.waiterX+=1.4; else ev.waiterX=target;
    if(Math.abs(ev.waiterX-target)<2){ev.phase=2;ev.timer=0;}
  }
  else if(ev.phase===2){
    ev.beerY=Math.max(-12,-ev.timer*0.3);
    if(ev.timer%8===0) ev.beerBubbles.push({x:ev.waiterX+17+Math.random()*4,y:GROUND_Y-38+ev.beerY-2,vy:-0.4-Math.random()*0.3,life:30});
    if(ev.timer>100){ev.phase=3;ev.timer=0;}
  }
  else if(ev.phase===3){
    if(ev.timer%6===0) spawnParticles(player.x+10,player.y,['#FFD700','#FF8800','#FFFFFF'][ev.timer%3|0],3);
  }
  ev.beerBubbles=ev.beerBubbles.filter(b=>{b.x+=Math.sin(b.life*0.3)*0.3;b.y+=b.vy;b.life--;return b.life>0;});
  drawParticles();
}

// ─── UPDATE ───────────────────────────────────────────────────────────────────
function reset() {
  score=0; lives=5; level=1; stored=0; basketCount=0;
  walnuts=[]; bikes=[]; particles=[]; floatingTexts=[];
  walnutInterval=90; bikeInterval=120; level2Score=0;
  player.x=110; player.y=GROUND_Y-38; player.vy=0; player.onGround=true; player.jumping=false;
  walkFrame=0; walkTimer=0;
  beerEvent={ triggered:false, phase:0, timer:0, waiterX:0, doorOpen:0, beerY:0, beerBubbles:[] };
  stunned={ active:false, timer:0, duration:180 };
  nameEntry={ active:false, initials:'', cursor:0, savedInitials:'' };
  gameMode=1;
  state='playing'; startMusic();
}

function startLevel2() {
  gameMode=2;
  bikes=[]; particles=[]; floatingTexts=[];
  bikeInterval=120; level2Score=0; stunned={active:false,timer:0,duration:180};
  stunned={ active:false, timer:0, duration:180 };
  player.x=GW/2-10; player.y=GROUND_Y-38; player.vy=0; player.onGround=true; player.jumping=false;
  level=2;
  state='level2intro';
}

function update() {
  if(state==='start'||state==='gameover') return;
  if(state==='intro') return;
  if(state==='beer'){ updateBeer(); return; }
  if(state==='level2intro') return;

  blinkTimer++;

  // ── Aturdido (nivel 2) ──
  if(stunned.active){
    stunned.timer++;
    if(stunned.timer>=stunned.duration){ stunned.active=false; player.x=GW/2-10; player.y=GROUND_Y-player.h; }
    drawHUD();
    return;
  }

  // ── Movimiento horizontal ──
  const spd = player.speed*(1+(gameMode===2?level2Score/200:level*0.1));
  if(keys['ArrowLeft']||keys['a']) player.x-=spd;
  if(keys['ArrowRight']||keys['d']) player.x+=spd;
  player.x=Math.max(2,Math.min(GW-player.w-2,player.x));

  // ── Salto (solo nivel 2) ──
  if(gameMode===2){
    if((keys[' ']||keys['ArrowUp'])&&player.onGround&&!keys._jumpPrev){
      player.vy=JUMP_FORCE;
      player.onGround=false;
      player.jumping=true; sfxJump();
      keys._jumpPrev=true;
    }
    player.y+=player.vy;
    player.vy+=GRAVITY;
    if(player.y>=GROUND_Y-player.h){
      player.y=GROUND_Y-player.h;
      player.vy=0;
      player.onGround=true;
      player.jumping=false;
    }
  } else {
    player.y=GROUND_Y-player.h;
  }

  if(!(keys[' ']||keys['ArrowUp'])) keys._jumpPrev=false;

  // ── MODO 1: Nueces ──
  if(gameMode===1){
    // Depositar: automático al estar sobre el contenedor, o con espacio
    const sobreContenedor = basketCount>0 && rectOverlap(player.x,player.y,player.w,player.h,CONTAINER_X-10,CONTAINER_Y-10,CONTAINER_W+20,CONTAINER_H+20);
    if(sobreContenedor){
        const pts=basketCount*5;
        score+=pts; stored+=basketCount;
        addFloatText(`+${pts}`,player.x,player.y-10,'#FFD700');
        spawnParticles(CONTAINER_X+CONTAINER_W/2,CONTAINER_Y,'#FFD700',10);
        spawnParticles(CONTAINER_X+CONTAINER_W/2,CONTAINER_Y,'#C8903A',8);
        basketCount=0; sfxDeposit();
        if(score>=BEER_SCORE&&!beerEvent.triggered){
          beerEvent.triggered=true; beerEvent.phase=0; sfxBeer(); beerEvent.timer=0;
          beerEvent.waiterX=-20; beerEvent.doorOpen=0; beerEvent.beerY=0; beerEvent.beerBubbles=[];
          state='beer'; walnuts=[];
        }
        if(stored>=level*15){ walnutInterval=Math.max(30,walnutInterval-8); addFloatText('+ VELOCIDAD!',GW/2-30,GH/2,'#00FF88'); sfxLevelUp(); spawnParticles(GW/2,GH/2,'#00FF88',15); }
    }
    if(!keys[' ']) keys._spacePrev=false;

    walnutTimer++;
    if(walnutTimer>=walnutInterval){ spawnWalnut(); walnutTimer=0; if(level>2&&Math.random()<0.3) spawnWalnut(); }

    walnuts=walnuts.filter(n=>{
      n.y+=n.vy; n.wobble+=n.wobbleSpeed;
      const nx=n.x+Math.sin(n.wobble)*2;
      if(rectOverlap(nx,n.y,n.w,n.h,player.x,player.y,player.w,10)){
        if(basketCount<BASKET_MAX){ basketCount++; spawnParticles(nx+4,n.y+4,'#C8903A',5); addFloatText(`${basketCount}/${BASKET_MAX}`,nx,n.y,'#FFFFFF'); sfxPickup(); }
        else{ spawnParticles(nx+4,n.y+4,'#FF4444',4); addFloatText('LLENA!',nx-5,n.y-5,'#FF4444'); }
        return false;
      }
      if(n.y>GROUND_Y){ spawnParticles(nx+4,GROUND_Y,'#8B5A2F',4); return false; }
      return true;
    });
  }

  // ── MODO 2: Bicis ──
  if(gameMode===2){
    // Las nueces siguen cayendo igual que en modo 1
    walnutTimer++;
    if(walnutTimer>=walnutInterval){ spawnWalnut(); walnutTimer=0; if(level>2&&Math.random()<0.3) spawnWalnut(); }

    walnuts=walnuts.filter(n=>{
      n.y+=n.vy; n.wobble+=n.wobbleSpeed;
      const nx=n.x+Math.sin(n.wobble)*2;
      if(rectOverlap(nx,n.y,n.w,n.h,player.x,player.y,player.w,10)){
        if(basketCount<BASKET_MAX){ basketCount++; spawnParticles(nx+4,n.y+4,'#C8903A',5); addFloatText(`${basketCount}/${BASKET_MAX}`,nx,n.y,'#FFFFFF'); }
        else{ spawnParticles(nx+4,n.y+4,'#FF4444',4); addFloatText('LLENA!',nx-5,n.y-5,'#FF4444'); }
        return false;
      }
      if(n.y>GROUND_Y){ return false; } // en nivel 2 no se pierde vida por nueces caídas
      return true;
    });

    // Depositar en contenedor: automático al estar encima
    const sobreContenedor2 = basketCount>0 && rectOverlap(player.x,player.y,player.w,player.h,CONTAINER_X-10,CONTAINER_Y-10,CONTAINER_W+20,CONTAINER_H+20);
    if(sobreContenedor2){
        const pts=basketCount*5;
        score+=pts; stored+=basketCount;
        addFloatText(`+${pts}`,player.x,player.y-10,'#FFD700');
        spawnParticles(CONTAINER_X+CONTAINER_W/2,CONTAINER_Y,'#FFD700',10);
        basketCount=0; sfxDeposit();
    }
    if(!keys[' ']) keys._spacePrev=false;

    // Bicis: solo spawnan y atropellan, no dan puntos
    bikeTimer++;
    const spawnRate=Math.max(40,bikeInterval-Math.floor(level*8));
    if(bikeTimer>=spawnRate){ spawnBike(); bikeTimer=0; }

    bikes=bikes.filter(b=>{
      b.x+=b.vx;
      b.frameTimer++; if(b.frameTimer>6){b.frame=(b.frame+1)%4;b.frameTimer=0;}

      // Marcar como esquivada si el jugador saltó por encima (sin puntos)
      if(!b.jumped && player.jumping && player.y+player.h < b.y+4 &&
         rectOverlap(player.x+3,player.y,player.w-6,player.h, b.x,b.y,b.w,b.h)){
        b.jumped=true;
      }

      // Colisión → aturdido
      if(!b.jumped && player.onGround && !stunned.active &&
         rectOverlap(player.x+2,player.y+10,player.w-4,player.h-10, b.x+2,b.y+4,b.w-4,b.h-4)){
        lives--;
        b.jumped=true;
        spawnParticles(player.x+10,player.y+10,'#FF4444',14);
        addFloatText('-1♥',player.x,player.y-10,'#FF4444');
        if(lives<=0){ state='gameover'; stopMusic(); nameEntry={active:true,initials:'',cursor:0,savedInitials:''}; focusMobileInput(); }
        else { sfxBikeHit(); stunned.active=true; stunned.timer=0; }
      }

      if(b.x > GW+40 || b.x < -40) return false;
      return true;
    });
  }

  particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life--;return p.life>0;});
  floatingTexts=floatingTexts.filter(t=>{t.y+=t.vy;t.life--;return t.life>0;});
  drawHUD();
}


// ─── DRAW STUNNED PLAYER ─────────────────────────────────────────────────────
function drawStunnedPlayer() {
  const x = player.x, y = GROUND_Y - 12; // tumbado en el suelo
  // Sombra
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse((x+19)*SCALE, (GROUND_Y+1)*SCALE, 20*SCALE, 3*SCALE, 0, 0, Math.PI*2);
  ctx.fill();
  // Cuerpo tumbado (rotado ~90°) - dibujamos horizontalmente
  // Piernas
  gpx(x+28,y+4,10,5,'#5A4A8A'); gpx(x+36,y+4,6,5,'#5A4A8A');
  gpx(x+36,y+8,5,3,'#3A2A1A');
  // Torso
  gpx(x+14,y+2,16,8,'#4A8A4A');
  // Brazos abiertos
  gpx(x+14,y-1,4,4,'#F4A460'); gpx(x+14,y+9,4,4,'#F4A460');
  // Cabeza
  gpx(x+4,y+1,12,10,'#F4A460');
  // Sombrero
  gpx(x+3,y-1,14,4,'#8B4513'); gpx(x+5,y-3,10,3,'#6B3410');
  // Ojos cerrados (X X)
  gpx(x+6,y+4,2,2,'#2A1A0A'); gpx(x+6,y+5,2,1,'#2A1A0A');
  gpx(x+10,y+4,2,2,'#2A1A0A'); gpx(x+10,y+5,2,1,'#2A1A0A');
  // Lengua fuera
  gpx(x+7,y+8,4,2,'#FF6666');

  // Estrellas girando encima de la cabeza
  const t = stunned.timer;
  const starColors = ['#FFD700','#FFFFFF','#FFD700','#FFAA00'];
  for(let i=0;i<4;i++){
    const angle = (t * 0.06) + (i * Math.PI/2);
    const sx = x + 8 + Math.round(14*Math.cos(angle));
    const sy = y - 8 + Math.round(5*Math.sin(angle));
    const c = starColors[i];
    // Dibujar estrellita ★
    gpx(sx,sy,3,1,c); gpx(sx+1,sy-1,1,3,c); gpx(sx,sy+1,3,1,c);
  }

  // Contador regresivo
  const secsLeft = Math.ceil((stunned.duration - stunned.timer)/60);
  gtxt(`${secsLeft}...`, x+6, y-18, '#FFFFFF', 6);
}

  // Botón saltar intro — siempre visible encima del scroll
  if(!document.getElementById('skipIntroBtn')){
    var skipBtn = document.createElement('button');
    skipBtn.id = 'skipIntroBtn';
    skipBtn.innerHTML = '&#9654; SALTAR INTRO';
    skipBtn.style.cssText = [
      'position:absolute',
      'bottom:18px',
      'left:50%',
      'transform:translateX(-50%)',
      'z-index:99',
      'background:#1a0a2e',

      'color:#ffd700',
      'font-family:"Press Start 2P",monospace',
      'font-size:11px',
      'padding:10px 20px',
      'cursor:pointer',
      'text-shadow:1px 1px #8b6914',
      'box-shadow:0 0 12px #ffd70088',
      'letter-spacing:1px',
      'white-space:nowrap',
      'animation:blinkBtn 1s step-end infinite'
    ].join(';');
    skipBtn.addEventListener('click', function(){ hideIntro(); });
    skipBtn.addEventListener('touchstart', function(e){ e.preventDefault(); hideIntro(); }, {passive:false});
    introOv.appendChild(skipBtn);
  } else {
    document.getElementById('skipIntroBtn').style.display = 'block';
  }

  // Añadir keyframe si no existe
  if(!document.getElementById('skipBtnStyle')){
    var st = document.createElement('style');
    st.id = 'skipBtnStyle';
    st.textContent = '@keyframes blinkBtn{0%,100%{opacity:1}50%{opacity:0.4}}';
    document.head.appendChild(st);
  }

  introOv.style.display = 'block';

  var scrollPos = introOv.offsetHeight + 10;
  crawlEl.style.top = scrollPos + 'px';

  function scrollStep() {
    if(state !== 'intro') return;
    scrollPos -= 0.9;
    crawlEl.style.top = scrollPos + 'px';
    if(scrollPos < -(crawlEl.offsetHeight + 50)){
      hideIntro();
      return;
    }
    requestAnimationFrame(scrollStep);
  }
  requestAnimationFrame(scrollStep);
}


function drawIntroScreen() {
  // handled by showIntro() / CSS overlay
}

function hideIntro() {
  document.getElementById('introOverlay').style.display = 'none';
  var sb = document.getElementById('skipIntroBtn');
  if(sb) sb.style.display = 'none';
  state = 'playing';
  drawBG();
}


function render() {
  if(state==='intro'){ ctx.clearRect(0,0,W,H); drawIntroScreen(); return; }
  ctx.clearRect(0,0,W,H);
  if(state==='start'){drawStartScreen();return;}
  if(state==='gameover'){drawGameOver();return;}
  if(state==='level2intro'){drawLevel2Intro();return;}
  if(state==='beer'){drawContainer(false);walnuts.forEach(drawWalnut);drawBeerScene();return;}

  if(gameMode===1){
    drawContainer(basketCount>=BASKET_MAX);
    walnuts.forEach(drawWalnut);
    drawPlayer(); drawParticles(); drawFloatingTexts();
    if(basketCount>=BASKET_MAX&&blinkTimer%40<20){
      const ax=CONTAINER_X+CONTAINER_W/2;
      ctx.fillStyle='#FFD700';
      ctx.beginPath(); ctx.moveTo(ax*SCALE,(CONTAINER_Y-12)*SCALE); ctx.lineTo((ax-5)*SCALE,(CONTAINER_Y-20)*SCALE); ctx.lineTo((ax+5)*SCALE,(CONTAINER_Y-20)*SCALE); ctx.fill();
      gtxt('¡VACIAR!',CONTAINER_X-10,CONTAINER_Y-25,'#FFD700',4);
    }
  }

  if(gameMode===2){
    // Dibujar contenedor y nueces igual que modo 1
    drawContainer(basketCount>=BASKET_MAX);
    walnuts.forEach(drawWalnut);

    // Si está aturdido, mostrar jugador tumbado con estrellas y salir
    if(stunned.active){
      bikes.forEach(drawBike);
      drawParticles(); drawFloatingTexts();
      drawStunnedPlayer();
      return;
    }

    // Advertencia si viene bici
    bikes.forEach(b=>{
      if(!b.jumped){
        const alertX=b.fromRight?GW-20:8;
        if(Math.floor(Date.now()/200)%2===0) gtxt('!',alertX,GROUND_Y-50,'#FF4444',10);
      }
    });

    // Sombra salto
    if(player.jumping){
      ctx.fillStyle='rgba(0,0,0,0.15)';
      ctx.beginPath(); ctx.ellipse((player.x+10)*SCALE,(GROUND_Y+1)*SCALE,12*SCALE,3*SCALE,0,0,Math.PI*2); ctx.fill();
    }

    bikes.forEach(drawBike);
    drawPlayer(); drawParticles(); drawFloatingTexts();

    // Indicador vaciar cesta
    if(basketCount>=BASKET_MAX&&blinkTimer%40<20){
      const ax=CONTAINER_X+CONTAINER_W/2;
      ctx.fillStyle='#FFD700';
      ctx.beginPath(); ctx.moveTo(ax*SCALE,(CONTAINER_Y-12)*SCALE); ctx.lineTo((ax-5)*SCALE,(CONTAINER_Y-20)*SCALE); ctx.lineTo((ax+5)*SCALE,(CONTAINER_Y-20)*SCALE); ctx.fill();
      gtxt('¡VACIAR!',CONTAINER_X-10,CONTAINER_Y-25,'#FFD700',4);
    }

    // Indicador SALTA cuando viene bici cerca
    bikes.forEach(b=>{
      if(!b.jumped){
        const dist=Math.abs((player.x+10)-(b.x+b.w/2));
        if(dist<60&&player.onGround&&Math.floor(Date.now()/300)%2===0){
          gtxt('¡SALTA!',player.x-8,player.y-12,'#FF4444',5);
        }
      }
    });
  }
}

// ─── MAIN LOOP ────────────────────────────────────────────────────────────────
function loop(){ update(); render(); requestAnimationFrame(loop); }

// ─── INPUT ────────────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  e.preventDefault();

  // ── Entrada de iniciales ──
  if(state==='gameover' && nameEntry.active){
    if(e.key==='Backspace'){
      if(nameEntry.initials.length>0){
        nameEntry.initials=nameEntry.initials.slice(0,-1);
        nameEntry.cursor=nameEntry.initials.length;
      }
      return;
    }
    if(e.key==='Enter' && nameEntry.initials.length===3){
      nameEntry.savedInitials = nameEntry.initials;
      addToRanking(nameEntry.initials, score);
      nameEntry.active=false;
      return;
    }
    if(/^[a-zA-Z]$/.test(e.key) && nameEntry.initials.length<3){
      nameEntry.initials += e.key.toUpperCase();
      nameEntry.cursor = nameEntry.initials.length;
      if(nameEntry.initials.length===3) nameEntry.cursor=2;
      return;
    }
    return;
  }

  if(e.key===' '){
    if(state==='start'){ state='intro'; introScroll=0; try{ startMusic(); }catch(e2){} showIntro(); return; }
    if(state==='intro'){ hideIntro(); return; }
    if(state==='gameover'){ reset(); return; }
    if(state==='beer'&&beerEvent.phase>=3){ startLevel2(); return; }
    if(state==='level2intro'){ state='playing'; return; }
  }
  keys[e.key]=true;
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

// Touch
let touchStartX=null;
gc.addEventListener('click',e=>{
  if(state==='start'){ state='intro'; introScroll=0; try{ startMusic(); }catch(e2){} showIntro(); return; }
  if(state==='intro'){ hideIntro(); return; }
});
gc.addEventListener('touchstart',e=>{
  e.preventDefault(); touchStartX=e.touches[0].clientX;
  if(state==='start'){state='intro';introScroll=0;startMusic();showIntro();return;}
  if(state==='intro'){hideIntro();return;}
  if(state==='gameover'){
    if(nameEntry.active){
      // Si tiene 3 iniciales, tocar guarda
      if(nameEntry.initials.length===3){
        nameEntry.savedInitials=nameEntry.initials;
        addToRanking(nameEntry.initials,score);
        nameEntry.active=false;
        blurMobileInput();
      } else {
        // Re-enfocar teclado
        focusMobileInput();
      }
      return;
    }
    reset();return;
  }
  if(state==='beer'&&beerEvent.phase>=3){startLevel2();return;}
  if(state==='level2intro'){state='playing';return;}
  if(gameMode===2){keys[' ']=true;setTimeout(()=>keys[' ']=false,150);}
},{passive:false});

gc.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(state!=='playing') return;
  const rect=gc.getBoundingClientRect();
  const relX=e.touches[0].clientX-rect.left;
  player.x=Math.max(2,Math.min(GW-player.w-2,(relX/rect.width)*GW-player.w/2));
},{passive:false});

gc.addEventListener('touchend',e=>{
  e.preventDefault();
  if(state==='playing'&&gameMode===2&&Math.abs(e.changedTouches[0].clientX-(touchStartX||0))<15){
    keys[' ']=true; setTimeout(()=>keys[' ']=false,150);
  }
  touchStartX=null;
},{passive:false});

state='start';
loop();
